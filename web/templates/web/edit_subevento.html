{% extends 'web/base.html' %}
{% block content %}

<h2>Editar Sub-evento: {{ subevento.nombre }}</h2>
<p>Evento padre: <a href="{% url 'event_detail' evento.pk %}">{{ evento.nombre }}</a></p>

<form method="post" class="card p-4 shadow">
    {% csrf_token %}
    {{ form.as_p }}
    {% if config_form %}
    <hr>
    <h5>⚙️ Configuración de Servicios</h5>
    {{ config_form.as_p }}
    {% endif %}
    <button class="btn btn-primary">Guardar</button>
    <a href="{% url 'event_detail' evento.pk %}" class="btn btn-secondary ms-2">Cancelar</a>
</form>

{% endblock %}
