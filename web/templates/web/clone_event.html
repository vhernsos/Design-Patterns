{% extends 'web/base.html' %}
{% block content %}

<h1>Clonar Evento</h1>
<p>Se creará una copia del evento: <strong>{{ original.nombre }}</strong></p>

<form method="post" class="card p-4 shadow">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn btn-warning">Clonar</button>
    <a href="{% url 'event_detail' original.pk %}" class="btn btn-secondary ms-2">Cancelar</a>
</form>

{% endblock %}
