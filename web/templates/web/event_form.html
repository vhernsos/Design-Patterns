{% extends 'web/base.html' %}
{% block content %}

<h1>{{ title }}</h1>

<form method="post" class="card p-4 shadow">
    {% csrf_token %}
    {{ form.as_p }}
    {% if config_form %}
    <hr>
    <h5>Servicios</h5>
    {{ config_form.as_p }}
    {% endif %}
    <button class="btn btn-primary">Guardar</button>
    <a href="{% url 'dashboard' %}" class="btn btn-secondary ms-2">Cancelar</a>
</form>

{% endblock %}
