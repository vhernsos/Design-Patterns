{% extends 'web/base.html' %}
{% block content %}

<div class="card p-4 shadow" style="max-width:500px;margin:0 auto;">
  <h2>¿Eliminar Evento?</h2>
  <p>Estás a punto de eliminar permanentemente <strong>{{ evento.nombre }}</strong>. Esta acción <strong>no se puede deshacer</strong>.</p>
  <form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Sí, Eliminar</button>
    <a href="{% url 'event_detail' evento.pk %}" class="btn btn-secondary ms-2">Cancelar</a>
  </form>
</div>

{% endblock %}
