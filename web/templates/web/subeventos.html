{% extends 'web/base.html' %}
{% block content %}

<h2>Añadir Sub-evento a: {{ evento_padre.nombre }}</h2>

<form method="post" class="card p-4 shadow">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn btn-primary">Guardar</button>
    <a href="{% url 'event_detail' evento_padre.pk %}" class="btn btn-secondary ms-2">Cancelar</a>
</form>

{% endblock %}
