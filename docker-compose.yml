version: '3.9'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bodas_web
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - DJANGO_ENV=development
      - DJANGO_SETTINGS_MODULE=config.settings
      - DEBUG=True
    depends_on:
      db:
        condition: service_healthy
    command: python manage.py runserver 0.0.0.0:8000

  db:
    image: postgres:15-alpine
    container_name: bodas_db
    environment:
      POSTGRES_DB: bodas_db
      POSTGRES_USER: bodas_user
      POSTGRES_PASSWORD: bodas_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bodas_user"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
